<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Readify</title>
  <!-- Tailwind CSS (opcional) -->
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <!-- Fonte Playfair Display -->
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&display=swap" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Playfair Display', serif;
      overflow: hidden;
      height: 100vh;
      background: #faf8f5;
      cursor: pointer; /* indica que a tela é clicável */
    }

    .intro-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      width: 100%;
      position: relative;
      background: linear-gradient(145deg, #faf8f5 0%, #f0ebe3 100%);
    }

    /* Partículas flutuantes */
    .particle {
      position: absolute;
      border-radius: 50%;
      opacity: 0;
      animation: drift 6s ease-in-out infinite;
      pointer-events: none;
    }

    @keyframes drift {
      0% {
        opacity: 0;
        transform: translateY(0) scale(0.5);
      }
      20% {
        opacity: 0.7;
      }
      80% {
        opacity: 0.4;
      }
      100% {
        opacity: 0;
        transform: translateY(-120px) scale(1.2);
      }
    }

    /* Anel brilhante pulsante atrás do logo */
    .glow-ring {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 2px solid rgba(82, 112, 90, 0.3);
      animation: pulseRing 2s ease-in-out infinite 1s;
      pointer-events: none;
    }

    @keyframes pulseRing {
      0%,
      100% {
        transform: scale(1);
        opacity: 0.3;
      }
      50% {
        transform: scale(1.15);
        opacity: 0.7;
        box-shadow: 0 0 40px rgba(82, 112, 90, 0.4);
      }
    }

    /* Container do logo (entrada com efeito) */
    .logo-container {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      animation: logoReveal 1s cubic-bezier(0.34, 1.56, 0.64, 1) 0.5s forwards;
    }

    @keyframes logoReveal {
      from {
        opacity: 0;
        transform: scale(0.3) rotate(-10deg);
      }
      to {
        opacity: 1;
        transform: scale(1) rotate(0deg);
      }
    }

    /* Logo (imagem PNG) – caminho corrigido para a pasta icons */
    .logo-img {
      width: 120px;
      height: 120px;
      z-index: 2;
      filter: drop-shadow(0 8px 24px rgba(82, 112, 90, 0.25));
      object-fit: contain;
    }

    /* Cada letra do nome "readify" com animação individual */
    .logo-letter {
      display: inline-block;
      opacity: 0;
      animation: letterBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes letterBounce {
      0% {
        opacity: 0;
        transform: translateY(40px) scale(0.5);
      }
      60% {
        transform: translateY(-5px) scale(1.05);
      }
      100% {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    /* Tagline */
    .tagline {
      opacity: 0;
      filter: blur(8px);
      transform: translateY(12px);
      animation: tagReveal 1s ease 2.8s forwards;
      color: #52705A;
      font-weight: 400;
      letter-spacing: 3px;
    }

    @keyframes tagReveal {
      to {
        opacity: 1;
        filter: blur(0);
        transform: translateY(0);
      }
    }

    /* Indicador de clique (opcional) */
    .click-hint {
      position: absolute;
      bottom: 40px;
      color: #aaa;
      font-size: 14px;
      font-family: 'DM Sans', sans-serif;
      opacity: 0.5;
      animation: pulseHint 2s ease-in-out infinite;
    }

    @keyframes pulseHint {
      0%,
      100% {
        opacity: 0.3;
        transform: translateY(0);
      }
      50% {
        opacity: 0.8;
        transform: translateY(4px);
      }
    }

    @media (min-width: 768px) {
      .logo-img {
        width: 160px;
        height: 160px;
      }
      .glow-ring {
        width: 280px;
        height: 280px;
      }
      .intro-wrap h1 {
        font-size: 4.5rem !important;
      }
    }
  </style>
</head>
<body>
  <!-- Ao clicar em qualquer lugar da tela, redireciona para home.html -->
  <main class="intro-wrap" id="intro" onclick="goToHome()">
    <!-- Partículas geradas via JS -->

    <!-- Anel pulsante -->
    <div class="glow-ring"></div>

    <!-- Container do logo -->
    <div class="logo-container">
      <!-- Caminho corrigido: pasta icons + nome do arquivo -->
      <img
        class="logo-img"
        src="icons/Readify Logo Provisória.png"
        alt="Readify Logo"
        onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22%3E%3Ccircle cx=%2250%22 cy=%2250%22 r=%2245%22 fill=%22%2352705A%22/%3E%3Ctext x=%2250%22 y=%2258%22 font-family=%22Arial%22 font-size=%2240%22 fill=%22white%22 text-anchor=%22middle%22%3ER%3C/text%3E%3C/svg%3E'"
      />
    </div>

    <!-- Título -->
    <h1 class="text-5xl md:text-7xl font-black tracking-tight mt-6" aria-label="readify">
      <span class="logo-letter" style="animation-delay:1.6s; color:#52705A;">r</span>
      <span class="logo-letter" style="animation-delay:1.7s; color:#52705A;">e</span>
      <span class="logo-letter" style="animation-delay:1.8s; color:#52705A;">a</span>
      <span class="logo-letter" style="animation-delay:1.9s; color:#52705A;">d</span>
      <span class="logo-letter" style="animation-delay:2.0s; color:#CF7A4A;">i</span>
      <span class="logo-letter" style="animation-delay:2.1s; color:#CF7A4A;">f</span>
      <span class="logo-letter" style="animation-delay:2.2s; color:#CF7A4A;">y</span>
    </h1>

    <!-- Tagline -->
    <p class="tagline mt-4 text-sm md:text-base tracking-widest uppercase">
      A sua biblioteca digital
    </p>

    <!-- Dica visual (opcional) -->
    <div class="click-hint">toque em qualquer lugar para entrar</div>
  </main>

  <script>
    // Gera partículas (mesmo código)
    (function createParticles() {
      const intro = document.getElementById('intro');
      const colors = ['#52705A', '#CF7A4A', '#D4C5B0', '#52705A', '#8B9D8A'];
      const count = 20;
      for (let i = 0; i < count; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 14 + 4;
        const left = Math.random() * 100;
        const top = Math.random() * 100;
        const delay = Math.random() * 5;
        const duration = 4 + Math.random() * 4;
        const color = colors[i % colors.length];
        p.style.cssText = `
          width: ${size}px; height: ${size}px;
          left: ${left}%; top: ${top}%;
          background: ${color};
          animation-delay: ${delay}s;
          animation-duration: ${duration}s;
        `;
        intro.appendChild(p);
      }
    })();

    // Função para redirecionar para home.html ao clicar
    function goToHome() {
      window.location.href = 'home.html';
    }
  </script>
</body>
</html>
