<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Readify - Home</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">
    <div class="app-header">
        <button class="back-btn" onclick="history.back()"><i class="fas fa-chevron-left"></i></button>
        <h1>Bem-vindo, Filipe!</h1>
        <div class="placeholder"></div>
    </div>

    <main>
        <div id="leituraContainer" class="card card-highlight"></div>
        <button id="btnBiblioteca" class="btn-primary" style="width: calc(100% - 32px); margin: 0 16px;">Ver minha biblioteca</button>
        <div style="height: 1px; background: #e2e8f0; margin: 24px 16px;"></div>
        <h2 style="margin: 0 16px 8px;">Obras em Destaque</h2>
        <div id="destaquesGrid" class="grid-3cols"></div>
    </main>

    <div class="bottom-menu">
        <a href="home.html" class="menu-item active"><i class="fas fa-home"></i><span>Home</span></a>
        <a href="meuslivros.html" class="menu-item"><i class="fas fa-book"></i><span>Meus Livros</span></a>
        <a href="favoritos.html" class="menu-item"><i class="fas fa-star"></i><span>Favoritos</span></a>
        <a href="perfil.html" class="menu-item"><i class="fas fa-user"></i><span>Perfil</span></a>
    </div>
</div>

<script src="db.js"></script>
<script>
    async function renderLeitura() {
        const livro = getLeituraAtual();
        const container = document.getElementById('leituraContainer');
        if (!livro) {
            container.innerHTML = '<div class="text-center">Nenhum livro em leitura. <a href="meuslivros.html" style="color:#3b9e8c;">Escolha um</a></div>';
            return;
        }
        const percent = livro.totalPaginas ? (livro.progressoPagina / livro.totalPaginas * 100).toFixed(0) : (livro.progresso || 0);
        container.innerHTML = `
            <div style="display:flex; gap:16px; flex-wrap:wrap;">
                <img src="${livro.capaUrl}" style="width:100px; aspect-ratio:2/3; object-fit:cover; border-radius:12px; cursor:pointer;" onclick="verDetalhes('${livro.id}')">
                <div style="flex:1;">
                    <span style="font-size:12px; color:#6b7280;">LEITURA ATUAL</span>
                    <p style="font-weight:bold; margin:8px 0;">${livro.titulo}</p>
                    <p style="font-size:13px;">${livro.autor}</p>
                    <div class="progress-bar"><div class="progress-fill" style="width:${percent}%"></div></div>
                    <p style="font-size:12px;">Progresso: ${percent}% ${livro.totalPaginas ? `(pág ${livro.progressoPagina}/${livro.totalPaginas})` : ''}</p>
                </div>
            </div>
        `;
    }

    function verDetalhes(id) {
        window.location.href = `detalhes.html?id=${id}`;
    }

    function renderDestaques() {
        const livros = getLivros().slice(0,3);
        const grid = document.getElementById('destaquesGrid');
        if (livros.length === 0) {
            grid.innerHTML = '<p class="text-center">Nenhum livro cadastrado.</p>';
            return;
        }
        grid.innerHTML = livros.map(l => `
            <div onclick="verDetalhes('${l.id}')" style="cursor:pointer;">
                <img src="${l.capaUrl}" class="book-cover">
                <p style="font-weight:bold; margin-top:6px;">${l.titulo.length>20?l.titulo.slice(0,17)+'...':l.titulo}</p>
                <p style="font-size:12px; color:#6b7280;">${l.autor}</p>
            </div>
        `).join('');
    }

    document.getElementById('btnBiblioteca').onclick = () => location.href='meuslivros.html';
    renderLeitura();
    renderDestaques();
    window.verDetalhes = verDetalhes;
</script>
</body>
</html>
